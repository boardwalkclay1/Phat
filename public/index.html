<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Phat Tribute</title>

<link rel="icon" type="image/jpeg" href="phat.jpg">

<!-- CINEMATIC SOCIAL PREVIEW -->
<meta property="og:title" content="In Loving Memory of Phat">
<meta property="og:description" content="Forever in our hearts.">
<meta property="og:image" content="https://boardwalkclay1.github.io/Phat/phat.jpg">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">

<link rel="manifest" href="manifest.json">

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }

  /* BACKGROUND — EXPANDED + MOVED UP */
  body {
    background-image: url('phat.jpg');
    background-size: 210% auto;               /* expanded ~1 inch */
    background-repeat: no-repeat;
    background-position: center calc(50% - 48px); /* move UP ~1/2 inch */
  }

  /* VIGNETTE */
  #vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.65) 100%);
    z-index: 2;
  }

  /* LIGHT RAYS */
  #lightRays {
    position: fixed;
    inset: 0;
    background: url('https://i.imgur.com/7N4Q0kM.png') center/cover no-repeat;
    opacity: 0.18;
    mix-blend-mode: screen;
    pointer-events: none;
    z-index: 1;
  }

  /* PARTICLES */
  #particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 3;
    background-image: url('https://i.imgur.com/8fKQZ8R.png');
    background-size: cover;
    opacity: 0.25;
    animation: drift 40s linear infinite;
  }

  @keyframes drift {
    from { transform: translateY(0); }
    to { transform: translateY(-200px); }
  }

  /* NAME + DATES */
  #titleBlock {
    position: absolute;
    top: 40px;
    width: 100%;
    text-align: center;
    color: white;
    z-index: 10;
    animation: fadeIn 2s ease forwards;
  }

  #titleBlock h1 {
    margin: 0;
    font-size: 32px;
    font-weight: 600;
    text-shadow: 0 0 12px black;
  }

  #titleBlock h2 {
    margin: 6px 0 0;
    font-size: 18px;
    opacity: 0.85;
    text-shadow: 0 0 10px black;
  }

  /* VIDEO WRAPPER — KEEP VIDEO DOWN */
  #videoWrap {
    position: absolute;
    top: 260px; /* video LOWER */
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    width: 100%;
    z-index: 20;
    animation: fadeIn 2.5s ease forwards;
  }

  /* VIDEO */
  video {
    width: calc(90vw + 40px);
    max-width: calc(500px + 40px);
    height: auto;
    max-height: 70vh;
    object-fit: contain;
    background: #000;
    border-radius: 18px;
    box-shadow: 0 0 40px rgba(0,0,0,0.9);
  }

  /* AMBIENT GLOW */
  #glow {
    position: absolute;
    top: 260px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255,255,255,0.18), rgba(0,0,0,0));
    filter: blur(60px);
    z-index: 5;
    pointer-events: none;
  }

  /* FULLSCREEN BUTTON */
  #fsButton {
    margin-top: 18px;
    padding: 12px 22px;
    background: rgba(255,255,255,0.15);
    color: white;
    font-size: 18px;
    border-radius: 10px;
    border: 2px solid white;
    backdrop-filter: blur(4px);
    cursor: pointer;
    transition: 0.2s;
    display: inline-block;
  }

  #fsButton:active {
    transform: scale(0.96);
  }

  /* FADE IN */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<body>

<div id="lightRays"></div>
<div id="particles"></div>
<div id="vignette"></div>

<div id="titleBlock">
  <h1>Phat Bui</h1>
  <h2>Forever in Our Hearts</h2>
</div>

<div id="glow"></div>

<div id="videoWrap">
  <video id="tributeVideo" autoplay playsinline muted loop>
    <source src="https://github.com/boardwalkclay1/Phat/releases/download/memories/Phat.Bui.Slideshow.mp4" type="video/mp4">
  </video>

  <div id="fsButton">Fullscreen</div>
</div>

<script>
  const video = document.getElementById("tributeVideo");
  const fsButton = document.getElementById("fsButton");

  /* Unmute on first tap */
  document.body.addEventListener("click", () => {
    video.muted = false;
    video.play();
    if (navigator.vibrate) navigator.vibrate(10); // haptic
  }, { once: true });

  /* Loop with sound */
  video.addEventListener("ended", () => {
    video.muted = false;
    video.play();
  });

  /* FULLSCREEN BUTTON */
  fsButton.addEventListener("click", () => {
    video.muted = false;
    video.play();
    openFullscreen(video);
  });

  /* TAP ANYWHERE FULLSCREEN */
  video.addEventListener("click", () => {
    openFullscreen(video);
  });

  /* ROTATE FULLSCREEN */
  window.addEventListener("orientationchange", () => {
    if (Math.abs(window.orientation) === 90) {
      video.muted = false;
      video.play();
      openFullscreen(video);
    }
  });

  /* CORRECT iPHONE FULLSCREEN JS */
  function openFullscreen(video) {
    if (video.webkitEnterFullscreen) {
      video.webkitEnterFullscreen();   // iPhone Safari
    } else if (video.requestFullscreen) {
      video.requestFullscreen();        // Desktop + Android
    }
  }
</script>

</body>
</html>
