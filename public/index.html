<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phat Tribute</title>

<link rel="icon" type="image/jpeg" href="pht.jpg">

<meta property="og:title" content="Phat Tribute">
<meta property="og:description" content="In loving memory.">
<meta property="og:image" content="https://boardwalkclay1.github.io/Phat/pht.jpg">
<meta property="og:type" content="website">

<link rel="manifest" href="manifest.json">

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    height: 100%;
    width: 100%;
    overflow: hidden;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #wrapper {
    width: 100vw;
    height: 100vh;
    background: #000;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    background: #000;
    display: block;
  }

  #overlayFade {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    animation: fadeOut 2s ease forwards;
    pointer-events: none;
    z-index: 10;
  }

  @keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }
</style>
</head>

<body>

<div id="overlayFade"></div>

<div id="wrapper">
  <video id="tributeVideo" autoplay playsinline muted loop>
    <source src="https://github.com/boardwalkclay1/Phat/releases/download/memories/Phat.Bui.Slideshow.mp4" type="video/mp4">
  </video>
</div>

<script>
  const video = document.getElementById("tributeVideo");

  document.body.addEventListener("click", () => {
    video.muted = false;
    video.play();
    openFullscreen(video);
  }, { once: true });

  video.addEventListener("ended", () => {
    video.muted = false;
    video.play();
  });

  function openFullscreen(elem) {
    if (elem.requestFullscreen) elem.requestFullscreen();
    else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
    else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
  }
</script>

</body>
</html>
