<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Phat Tribute</title>

<link rel="icon" type="image/jpeg" href="pht.jpg">

<meta property="og:title" content="Phat Tribute">
<meta property="og:description" content="In loving memory.">
<meta property="og:image" content="https://boardwalkclay1.github.io/Phat/pht.jpg">
<meta property="og:type" content="website">

<link rel="manifest" href="manifest.json">

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #000;
  }

  /* FULLSCREEN BACKGROUND IMAGE — SHIFTED UP 0.5 INCH */
  body {
    background-image: url('pht.jpg');
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center calc(50% - 48px); /* half inch upward shift */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  /* CENTERED VIDEO — enlarged by 1/8 inch each direction */
  video {
    width: calc(90vw + 40px);
    max-width: calc(500px + 40px);
    height: auto;
    max-height: 70vh;
    object-fit: contain;
    background: #000;
    border-radius: 14px;
    box-shadow: 0 0 20px #000;
    margin-bottom: 14px;
  }

  /* FULLSCREEN BUTTON */
  #fsButton {
    padding: 12px 22px;
    background: rgba(255,255,255,0.15);
    color: white;
    font-size: 18px;
    border-radius: 10px;
    border: 2px solid white;
    backdrop-filter: blur(4px);
    cursor: pointer;
    transition: 0.2s;
  }

  #fsButton:active {
    transform: scale(0.96);
  }

  /* Fade overlay */
  #overlayFade {
    position: fixed;
    inset: 0;
    background: #000;
    animation: fadeOut 2s ease forwards;
    pointer-events: none;
    z-index: 10;
  }

  @keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }
</style>
</head>

<body>

<div id="overlayFade"></div>

<!-- CENTER VIDEO -->
<video id="tributeVideo" autoplay playsinline muted loop>
  <source src="https://github.com/boardwalkclay1/Phat/releases/download/memories/Phat.Bui.Slideshow.mp4" type="video/mp4">
</video>

<!-- FULLSCREEN BUTTON -->
<div id="fsButton">Go Fullscreen</div>

<script>
  const video = document.getElementById("tributeVideo");
  const fsButton = document.getElementById("fsButton");

  // Unmute on first tap
  document.body.addEventListener("click", () => {
    video.muted = false;
    video.play();
  }, { once: true });

  // Keep sound on loop
  video.addEventListener("ended", () => {
    video.muted = false;
    video.play();
  });

  // FULLSCREEN BUTTON
  fsButton.addEventListener("click", () => {
    openFullscreen(video);
  });

  // FULLSCREEN ON ROTATION (LANDSCAPE)
  window.addEventListener("orientationchange", () => {
    if (window.orientation === 90 || window.orientation === -90) {
      openFullscreen(video);
    }
  });

  function openFullscreen(elem) {
    if (elem.requestFullscreen) elem.requestFullscreen();
    else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
  }
</script>

</body>
</html>
