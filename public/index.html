<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Phat Tribute</title>

<link rel="icon" type="image/jpeg" href="phat.jpg">

<meta property="og:title" content="Phat Tribute">
<meta property="og:description" content="In loving memory.">
<meta property="og:image" content="https://boardwalkclay1.github.io/Phat/phat.jpg">
<meta property="og:type" content="website">

<link rel="manifest" href="manifest.json">

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #000;
  }

  /* BACKGROUND IMAGE — BIGGER + MOVED UP */
  body {
    background-image: url('phat.jpg');
    background-size: 140% auto;               /* zoom in more */
    background-repeat: no-repeat;
    background-position: center calc(50% - 120px); /* move UP more so eyes show */
  }

  /* VIDEO WRAPPER — moves video DOWN safely */
  #videoWrap {
    position: absolute;
    top: 160px; /* move video DOWN */
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    width: 100%;
  }

  /* VIDEO — enlarged by 1/8 inch each direction */
  video {
    width: calc(90vw + 40px);
    max-width: calc(500px + 40px);
    height: auto;
    max-height: 70vh;
    object-fit: contain;
    background: #000;
    border-radius: 14px;
    box-shadow: 0 0 20px #000;
  }

  /* FULLSCREEN BUTTON */
  #fsButton {
    margin-top: 18px;
    padding: 12px 22px;
    background: rgba(255,255,255,0.15);
    color: white;
    font-size: 18px;
    border-radius: 10px;
    border: 2px solid white;
    backdrop-filter: blur(4px);
    cursor: pointer;
    transition: 0.2s;
    display: inline-block;
  }

  #fsButton:active {
    transform: scale(0.96);
  }

  /* Fade overlay */
  #overlayFade {
    position: fixed;
    inset: 0;
    background: #000;
    animation: fadeOut 2s ease forwards;
    pointer-events: none;
    z-index: 10;
  }

  @keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }
</style>
</head>

<body>

<div id="overlayFade"></div>

<div id="videoWrap">
  <video id="tributeVideo" autoplay playsinline muted loop>
    <source src="https://github.com/boardwalkclay1/Phat/releases/download/memories/Phat.Bui.Slideshow.mp4" type="video/mp4">
  </video>

  <div id="fsButton">Go Fullscreen</div>
</div>

<script>
  const video = document.getElementById("tributeVideo");
  const fsButton = document.getElementById("fsButton");

  /* Unmute on first tap */
  document.body.addEventListener("click", () => {
    video.muted = false;
    video.play();
  }, { once: true });

  /* Keep sound on loop */
  video.addEventListener("ended", () => {
    video.muted = false;
    video.play();
  });

  /* FULLSCREEN BUTTON */
  fsButton.addEventListener("click", () => {
    video.muted = false;
    video.play();
    openFullscreen(video);
  });

  /* FULLSCREEN ON ROTATION */
  window.addEventListener("orientationchange", () => {
    if (Math.abs(window.orientation) === 90) {
      video.muted = false;
      video.play();
      openFullscreen(video);
    }
  });

  function openFullscreen(elem) {
    if (elem.requestFullscreen) elem.requestFullscreen();
    else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
  }
</script>

</body>
</html>
