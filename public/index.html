<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Phat Tribute</title>

<link rel="icon" type="image/jpeg" href="phat.jpg">

<meta property="og:title" content="In Loving Memory of Phat">
<meta property="og:description" content="Forever in our hearts.">
<meta property="og:image" content="https://boardwalkclay1.github.io/Phat/phat.jpg">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }

  /* BACKGROUND — EXPANDED + MOVED UP */
  body {
    background-image: url('phat.jpg');
    background-size: 210% auto;
    background-repeat: no-repeat;
    background-position: center calc(50% - 48px);
  }

  /* NAME + DATES */
  #titleBlock {
    position: absolute;
    top: 40px;
    width: 100%;
    text-align: center;
    color: white;
    z-index: 10;
    animation: fadeIn 2s ease forwards;
  }

  #titleBlock h1 {
    margin: 0;
    font-size: 32px;
    font-weight: 600;
    text-shadow: 0 0 12px black;
  }

  #titleBlock h2 {
    margin: 6px 0 0;
    font-size: 18px;
    opacity: 0.85;
    text-shadow: 0 0 10px black;
  }

  /* VIDEO WRAPPER — MOVE VIDEO DOWN + TINY BIT RIGHT */
  #videoWrap {
    position: absolute;
    top: 260px;
    left: calc(50% - 180px); /* moved RIGHT 20px */
    transform: translateX(-50%);
    text-align: center;
    width: 100%;
    z-index: 20;
    animation: fadeIn 2.5s ease forwards;
  }

  /* VIDEO */
  video {
    width: calc(90vw + 40px);
    max-width: calc(500px + 40px);
    height: auto;
    max-height: 70vh;
    object-fit: contain;
    background: #000;
    border-radius: 18px;
    box-shadow: 0 0 40px rgba(0,0,0,0.9);
  }

  /* SUBTLE GLOW — MATCH VIDEO SHIFT */
  #glow {
    position: absolute;
    top: 260px;
    left: calc(50% - 180px); /* moved RIGHT 20px */
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255,255,255,0.18), rgba(0,0,0,0));
    filter: blur(60px);
    z-index: 5;
    pointer-events: none;
  }

  /* EMOJI FLOATERS */
  .emoji {
    position: fixed;
    font-size: 42px;
    animation: floatUp 12s linear infinite;
    opacity: 0.9;
    pointer-events: none;
    z-index: 3;
  }

  @keyframes floatUp {
    from { transform: translateY(120vh); }
    to { transform: translateY(-20vh); }
  }

  /* FULLSCREEN BUTTON */
  #fsButton {
    margin-top: 18px;
    padding: 12px 22px;
    background: rgba(255,255,255,0.15);
    color: white;
    font-size: 18px;
    border-radius: 10px;
    border: 2px solid white;
    backdrop-filter: blur(4px);
    cursor: pointer;
    transition: 0.2s;
    display: inline-block;
  }

  #fsButton:active {
    transform: scale(0.96);
  }

  /* FADE IN */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<body>

<div id="titleBlock">
  <h1>Phat Bui</h1>
  <h2>Forever in Our Hearts</h2>
</div>

<div id="glow"></div>

<div id="videoWrap">
  <video id="tributeVideo" autoplay playsinline muted loop>
    <source src="https://github.com/boardwalkclay1/Phat/releases/download/memories/Phat.Bui.Slideshow.mp4" type="video/mp4">
  </video>

  <div id="fsButton">Fullscreen</div>
</div>

<!-- EMOJI FLOATERS -->
<div class="emoji" style="left:10%;">🕊️</div>
<div class="emoji" style="left:25%; animation-delay:2s;">🌸</div>
<div class="emoji" style="left:40%; animation-delay:4s;">🛼</div>
<div class="emoji" style="left:55%; animation-delay:1s;">🕊️</div>
<div class="emoji" style="left:70%; animation-delay:3s;">🌸</div>
<div class="emoji" style="left:85%; animation-delay:5s;">🛼</div>

<script>
  const video = document.getElementById("tributeVideo");
  const fsButton = document.getElementById("fsButton");

  document.body.addEventListener("click", () => {
    video.muted = false;
    video.play();
    if (navigator.vibrate) navigator.vibrate(10);
  }, { once: true });

  video.addEventListener("ended", () => {
    video.muted = false;
    video.play();
  });

  fsButton.addEventListener("click", () => {
    video.muted = false;
    video.play();
    openFullscreen(video);
  });

  video.addEventListener("click", () => {
    openFullscreen(video);
  });

  window.addEventListener("orientationchange", () => {
    if (Math.abs(window.orientation) === 90) {
      video.muted = false;
      video.play();
      openFullscreen(video);
    }
  });

  function openFullscreen(video) {
    if (video.webkitEnterFullscreen) {
      video.webkitEnterFullscreen();
    } else if (video.requestFullscreen) {
      video.requestFullscreen();
    }
  }
</script>

</body>
</html>
