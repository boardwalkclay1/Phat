<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Phat Tribute</title>

<link rel="icon" type="image/jpeg" href="pht.jpg">

<meta property="og:title" content="Phat Tribute">
<meta property="og:description" content="In loving memory.">
<meta property="og:image" content="https://boardwalkclay1.github.io/Phat/pht.jpg">
<meta property="og:type" content="website">

<link rel="manifest" href="manifest.json">

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    height: 100%;
    width: 100%;
    overflow: hidden;
  }

  body {
    position: fixed;
    inset: 0;
  }

  /* FORCE VIDEO TO FILL VERTICAL SCREEN */
  video {
    position: absolute;
    top: 50%;
    left: 50%;
    width: auto;
    height: 100vh;
    transform: translate(-50%, -50%);
    object-fit: cover;
    background: #000;
  }

  #overlayFade {
    position: fixed;
    inset: 0;
    background: #000;
    animation: fadeOut 2s ease forwards;
    pointer-events: none;
    z-index: 10;
  }

  @keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }
</style>
</head>

<body>

<div id="overlayFade"></div>

<video id="tributeVideo" autoplay playsinline muted loop>
  <source src="https://github.com/boardwalkclay1/Phat/releases/download/memories/Phat.Bui.Slideshow.mp4" type="video/mp4">
</video>

<script>
  const video = document.getElementById("tributeVideo");

  document.body.addEventListener("click", () => {
    video.muted = false;
    video.play();
    openFullscreen(video);
  }, { once: true });

  video.addEventListener("ended", () => {
    video.muted = false;
    video.play();
  });

  function openFullscreen(elem) {
    if (elem.requestFullscreen) elem.requestFullscreen();
    else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
  }
</script>

</body>
</html>
